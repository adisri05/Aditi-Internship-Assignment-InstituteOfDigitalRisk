<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transaction Ranking Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel transaction-panel">
        <div class="panel-heading">
          <h1>Transaction Ranking Demo</h1>
          <p>Submit transactions, retry request IDs, and watch summaries and fair rankings update.</p>
        </div>

        <form id="transactionForm" class="form-grid">
          <label>
            Request ID
            <input id="requestId" name="requestId" type="text" minlength="6" required />
          </label>
          <label>
            User ID
            <input id="userId" name="userId" type="text" pattern="[A-Za-z0-9_-]{3,64}" required />
          </label>
          <label>
            Amount
            <input id="amount" name="amount" type="number" min="0.01" max="1000000" step="0.01" required />
          </label>
          <label>
            Type
            <select id="type" name="type">
              <option value="purchase">Purchase</option>
              <option value="refund">Refund</option>
              <option value="bonus">Bonus</option>
            </select>
          </label>
          <button type="submit">Submit Transaction</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading compact">
          <h2>User Summary</h2>
          <div class="inline-controls">
            <input id="summaryUserId" type="text" placeholder="alice" />
            <button id="loadSummary" type="button">Load</button>
          </div>
        </div>
        <dl id="summary" class="metrics"></dl>
      </section>

      <section class="panel">
        <div class="panel-heading compact">
          <h2>Ranking</h2>
          <button id="refreshRanking" type="button">Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>User</th>
                <th>Score</th>
                <th>Points</th>
                <th>Txns</th>
                <th>Penalty</th>
              </tr>
            </thead>
            <tbody id="ranking"></tbody>
          </table>
        </div>
      </section>

      <pre id="output" class="output"></pre>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
